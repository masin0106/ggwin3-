name: yt-dlp-engine
on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      filename:
        required: false
      format_id:
        required: true
      ext:
        required: true
      start_time:
        required: false
      end_time:
        required: false
      embed_thumb:
        required: false
        default: 'false'
      embed_metadata:
        required: false
        default: 'false'
      codec_priority:
        required: false
        default: 'h264' # or 'av1_vp9'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Execute yt-dlp
        run: |
          # 出力ファイル名の決定
          OUT_NAME="${{ github.event.inputs.filename }}"
          if [ -z "$OUT_NAME" ]; then OUT_NAME="%(title)s"; fi
          
          # コーデック優先順位とフォーマットの設定
          # AV1/VP9優先か、H.264優先かを切り替え
          if [ "${{ github.event.inputs.codec_priority }}" = "av1_vp9" ]; then
            V_FILTER="av01/vp9/h264"
          else
            V_FILTER="h264/av01/vp9"
          fi

          # 解像度制限のロジック
          RES="${{ github.event.inputs.format_id }}" # 1080, 720 etc
          if [ "$RES" = "original" ] || [ -z "$RES" ]; then
            F_STR="bestvideo[vcodec^=$V_FILTER]+bestaudio/best"
          else
            F_STR="bestvideo[height<=$RES][vcodec^=$V_FILTER]+bestaudio/best"
          fi

          # 基本引数
          ARGS=(
            --newline
            -f "$F_STR"
            --merge-output-format "${{ github.event.inputs.ext }}"
            -o "output/$OUT_NAME.%(ext)s"
          )

          # オプション追加
          [[ "${{ github.event.inputs.embed_thumb }}" == "true" ]] && ARGS+=(--embed-thumbnail)
          [[ "${{ github.event.inputs.embed_metadata }}" == "true" ]] && ARGS+=(--embed-metadata)
          if [ ! -z "${{ github.event.inputs.start_time }}" ]; then
            ARGS+=(--download-sections "*${{ github.event.inputs.start_time }}-${{ github.event.inputs.end_time:-inf}}")
          fi

          # 実行
          yt-dlp "${ARGS[@]}" "${{ github.event.inputs.url }}"

      - name: Upload to Transfer.sh
        id: upload
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          # 30分待機してから削除するプロセスをバックグラウンドで回すか、Actionsの保持時間に任せる
          curl --upload-file "$FILE_PATH" https://transfer.sh/$(basename "$FILE_PATH") > download_link.txt
          echo "URL: $(cat download_link.txt)"
          sleep 1800 # 30分保持

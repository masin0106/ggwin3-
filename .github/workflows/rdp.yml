name: Windows-Browser-Final-V8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install and Start DWService
      shell: pwsh
      run: |
        $ErrorActionPreference = "Continue"

        # ========== 1. 64bit版エージェントをダウンロード ==========
        $ProgressPreference = 'SilentlyContinue'
        Write-Host ">>> [1] Downloading DWAgent (64-bit)..."
        Invoke-WebRequest -Uri "https://www.dwservice.net/download/dwagent.exe" `
          -OutFile "$env:TEMP\dwagent.exe" -UseBasicParsing
        Write-Host ">>> Downloaded: $((Get-Item $env:TEMP\dwagent.exe).Length) bytes"

        # ========== 2. サイレントインストール（Start-Process -Wait使用）==========
        Write-Host ">>> [2] Running silent installer with key=961-165-574 ..."
        $logFile = "C:\dwagent_install.log"
        $proc = Start-Process -FilePath "$env:TEMP\dwagent.exe" `
          -ArgumentList "-silent", "key=961-165-574", "logpath=$logFile" `
          -Wait -PassThru -NoNewWindow
        Write-Host ">>> Installer exit code: $($proc.ExitCode)"

        # インストールログを表示
        Start-Sleep -Seconds 3
        if (Test-Path $logFile) {
          Write-Host ">>> [Install Log Contents]"
          Get-Content $logFile | ForEach-Object { Write-Host "    $_" }
        } else {
          Write-Host ">>> (No install log found at $logFile)"
        }

        # ========== 3. 実際のインストール完了を監視（最大5分） ==========
        Write-Host ">>> [3] Waiting for installation to actually complete..."
        $maxWait = 300
        $elapsed = 0
        while ($elapsed -lt $maxWait) {
          Start-Sleep -Seconds 10
          $elapsed += 10

          $fileCount = 0
          if (Test-Path "C:\Program Files\DWAgent") {
            $fileCount = @(Get-ChildItem "C:\Program Files\DWAgent" -Recurse -File -ErrorAction SilentlyContinue).Count
          }

          $svc = Get-Service -Name "DWAgentService" -ErrorAction SilentlyContinue
          if (-not $svc) {
            $svc = Get-Service -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*dwagent*" -or $_.DisplayName -like "*DWAgent*" }
          }

          $svcStatus = if ($svc) { $svc.Status } else { "NOT FOUND" }
          Write-Host ">>>   ${elapsed}s elapsed | Files: $fileCount | Service: $svcStatus"

          if ($svc) {
            Write-Host ">>> Service found! Installation complete."
            break
          }

          if ($fileCount -gt 20 -and $elapsed -ge 120) {
            Write-Host ">>> Many files present but no service. Proceeding anyway."
            break
          }
        }

        # ========== 4. デバッグ情報の出力 ==========
        Write-Host ""
        Write-Host ">>> [4] === DEBUG INFO ==="

        Write-Host ">>> Admin check:"
        Write-Host ">>>   IsAdmin: $(([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator))"

        Write-Host ">>> Installed files (C:\Program Files\DWAgent):"
        if (Test-Path "C:\Program Files\DWAgent") {
          Get-ChildItem "C:\Program Files\DWAgent" -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize
        } else {
          Write-Host ">>>   Directory does not exist!"
        }

        # DWAgentが別の場所にインストールされている可能性をチェック
        Write-Host ">>> Searching for DWAgent in common locations..."
        @(
          "$env:LOCALAPPDATA\DWAgent",
          "$env:APPDATA\DWAgent",
          "C:\DWAgent",
          "$env:ProgramData\DWAgent"
        ) | ForEach-Object {
          if (Test-Path $_) {
            Write-Host ">>> Found at: $_"
            Get-ChildItem $_ -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize
          }
        }

        Write-Host ">>> All services with 'dw' or 'agent':"
        Get-Service -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, DisplayName, Status -AutoSize

        Write-Host ">>> DW-related processes:"
        Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, Id, Path -AutoSize

        # 最新のインストールログを再表示
        if (Test-Path $logFile) {
          Write-Host ">>> [Final Install Log]"
          Get-Content $logFile | ForEach-Object { Write-Host "    $_" }
        }

        # ========== 5. サービスを起動 ==========
        Write-Host ""
        Write-Host ">>> [5] Starting agent..."

        $svc = Get-Service -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dwagent*" -or $_.DisplayName -like "*DWAgent*" }
        if ($svc) {
          Write-Host ">>> Starting service: $($svc.Name)..."
          Start-Service -Name $svc.Name -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          $svcStatus = (Get-Service $svc.Name -ErrorAction SilentlyContinue).Status
          Write-Host ">>> Service status: $svcStatus"
        } else {
          Write-Host ">>> No service found. Trying direct execution..."

          # 各パスを検索して実行
          $searchPaths = @(
            "C:\Program Files\DWAgent\native\dwagsvc.exe"
            "C:\Program Files\DWAgent\native\dwagent.exe"
            "C:\Program Files\DWAgent\runtime\bin\dwagent.exe"
            "C:\Program Files\DWAgent\runtime\dwagent.exe"
            "C:\Program Files\DWAgent\dwagent.exe"
            "$env:LOCALAPPDATA\DWAgent\native\dwagsvc.exe"
            "$env:LOCALAPPDATA\DWAgent\native\dwagent.exe"
            "$env:ProgramData\DWAgent\native\dwagsvc.exe"
          )

          $started = $false
          foreach ($p in $searchPaths) {
            if (Test-Path $p) {
              Write-Host ">>> Starting: $p"
              Start-Process -FilePath $p -ErrorAction SilentlyContinue
              $started = $true
              Start-Sleep -Seconds 10
              break
            }
          }

          if (-not $started) {
            Write-Host ">>> Searching for any .exe in all DWAgent locations..."
            $allExes = @()
            @("C:\Program Files\DWAgent", "$env:LOCALAPPDATA\DWAgent", "C:\DWAgent", "$env:ProgramData\DWAgent") | ForEach-Object {
              if (Test-Path $_) {
                $allExes += Get-ChildItem $_ -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
              }
            }
            if ($allExes.Count -gt 0) {
              foreach ($exe in $allExes) {
                Write-Host ">>> Found exe: $($exe.FullName)"
              }
              # dwagsvcを優先
              $target = $allExes | Where-Object { $_.Name -like "*svc*" } | Select-Object -First 1
              if (-not $target) { $target = $allExes | Select-Object -First 1 }
              Write-Host ">>> Starting: $($target.FullName)"
              Start-Process -FilePath $target.FullName -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 10
            } else {
              Write-Host ">>> ERROR: No executables found in any DWAgent directory!"
            }
          }
        }

        # ========== 6. 最終確認 ==========
        Write-Host ""
        Write-Host ">>> [6] Final verification:"
        Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, Id, Path -AutoSize
        Get-Service -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, DisplayName, Status -AutoSize
        Write-Host ">>> Setup complete. Check DWService dashboard."

    - name: Keep Alive
      shell: pwsh
      run: |
        Write-Host "============================================"
        Write-Host " DWService Agent should now be online."
        Write-Host " https://www.dwservice.net でダッシュボード確認"
        Write-Host " セッションは6時間維持されます"
        Write-Host "============================================"
        Start-Sleep -Seconds 21600

name: Windows-Browser-Final-V7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install and Start DWService
      run: |
        $ErrorActionPreference = "Continue"

        # ========== 1. 64bit版エージェントをダウンロード ==========
        $ProgressPreference = 'SilentlyContinue'
        Write-Host ">>> [1] Downloading DWAgent (64-bit)..."
        Invoke-WebRequest -Uri "https://www.dwservice.net/download/dwagent.exe" `
          -OutFile "dwagent.exe" -UseBasicParsing
        Write-Host ">>> Downloaded: $((Get-Item dwagent.exe).Length) bytes"

        # ========== 2. cmd /c で実行（プロセスツリー全体を待機） ==========
        Write-Host ">>> [2] Running installer via cmd /c ..."
        cmd /c "dwagent.exe -silent key=672-623-195"
        Write-Host ">>> cmd returned: $LASTEXITCODE"

        # ========== 3. 実際のインストール完了を監視（最大3分） ==========
        Write-Host ">>> [3] Waiting for installation to actually complete..."
        $maxWait = 180
        $elapsed = 0
        while ($elapsed -lt $maxWait) {
          Start-Sleep -Seconds 10
          $elapsed += 10

          $fileCount = 0
          if (Test-Path "C:\Program Files\DWAgent") {
            $fileCount = @(Get-ChildItem "C:\Program Files\DWAgent" -Recurse -File -ErrorAction SilentlyContinue).Count
          }

          $svc = Get-Service -Name "DWAgentService" -ErrorAction SilentlyContinue
          if (-not $svc) {
            $svc = Get-Service -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*dwagent*" }
          }

          $svcStatus = if ($svc) { $svc.Status } else { "NOT FOUND" }
          Write-Host ">>>   ${elapsed}s elapsed | Files: $fileCount | Service: $svcStatus"

          # サービスが見つかったら完了
          if ($svc) {
            Write-Host ">>> Installation complete!"
            break
          }

          # ファイルが十分にあるが、サービスがまだない場合はもう少し待つ
          if ($fileCount -gt 20 -and $elapsed -ge 120) {
            Write-Host ">>> Files present but no service. Proceeding anyway."
            break
          }
        }

        # ========== 4. デバッグ情報の出力 ==========
        Write-Host ""
        Write-Host ">>> [4] === DEBUG INFO ==="

        Write-Host ">>> Admin check:"
        Write-Host ">>>   IsAdmin: $(([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator))"

        Write-Host ">>> Installed files:"
        if (Test-Path "C:\Program Files\DWAgent") {
          Get-ChildItem "C:\Program Files\DWAgent" -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize
        } else {
          Write-Host ">>>   Directory does not exist!"
        }

        Write-Host ">>> All services with 'dw' or 'agent':"
        Get-Service -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, DisplayName, Status -AutoSize

        Write-Host ">>> DW-related processes:"
        Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" -or $_.Name -like "*agent*" } |
          Format-Table Name, Id, Path -AutoSize

        # ========== 5. サービスを起動 ==========
        Write-Host ""
        Write-Host ">>> [5] Starting agent..."

        # 方法A: サービスとして起動
        $svc = Get-Service -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dwagent*" -or $_.DisplayName -like "*DWAgent*" }
        if ($svc) {
          Write-Host ">>> Starting service: $($svc.Name)..."
          Start-Service -Name $svc.Name -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          Write-Host ">>> Service status: $((Get-Service $svc.Name).Status)"
        } else {
          Write-Host ">>> No service found. Trying direct execution..."

          # 方法B: 実行ファイルを検索して直接起動
          $searchPaths = @(
            "C:\Program Files\DWAgent\native\dwagsvc.exe"
            "C:\Program Files\DWAgent\native\dwagent.exe"
            "C:\Program Files\DWAgent\runtime\bin\dwagent.exe"
            "C:\Program Files\DWAgent\runtime\dwagent.exe"
            "C:\Program Files\DWAgent\dwagent.exe"
          )

          $started = $false
          foreach ($p in $searchPaths) {
            if (Test-Path $p) {
              Write-Host ">>> Starting: $p"
              Start-Process -FilePath $p -ErrorAction SilentlyContinue
              $started = $true
              Start-Sleep -Seconds 10
              break
            }
          }

          if (-not $started) {
            # 方法C: ディレクトリ内の全 exe を検索
            Write-Host ">>> Searching for any executable..."
            $allExes = Get-ChildItem "C:\Program Files\DWAgent" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
            if ($allExes) {
              foreach ($exe in $allExes) {
                Write-Host ">>> Found: $($exe.FullName)"
              }
              $target = $allExes | Select-Object -First 1
              Write-Host ">>> Starting: $($target.FullName)"
              Start-Process -FilePath $target.FullName -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 10
            } else {
              Write-Host ">>> ERROR: No executables found in DWAgent directory!"
            }
          }
        }

        # ========== 6. 最終確認 ==========
        Write-Host ""
        Write-Host ">>> [6] Final verification:"
        Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -like "*dw*" } |
          Format-Table Name, Id -AutoSize
        Write-Host ">>> Setup complete. Check DWService dashboard."

    - name: Keep Alive
      run: |
        Write-Host "============================================"
        Write-Host " DWService Agent should now be online."
        Write-Host " https://www.dwservice.net でダッシュボード確認"
        Write-Host " セッションは6時間維持されます"
        Write-Host "============================================"
        Start-Sleep -Seconds 21600

name: Windows-RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Authenticate Ngrok
      run: .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Create User & Enable RDP
      run: |
        # 新しいユーザー 'remoteuser' を作成し、管理者権限を付与
        net user remoteuser P@ssword1234! /add
        net localgroup administrators remoteuser /add
        
        # RDPを有効化
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Create Tunnel
      run: |
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
        echo "Waiting for ngrok to initialize..."
        Start-Sleep -Seconds 30

    - name: Get RDP Address
      run: |
        $response = (curl http://localhost:4040/api/tunnels | ConvertFrom-Json)
        $address = $response.tunnels[0].public_url
        Write-Host "------------------------------------------"
        Write-Host "RDP Address: $address"
        Write-Host "User: remoteuser"
        Write-Host "Pass: P@ssword1234!"
        Write-Host "------------------------------------------"

    - name: Keep Alive
      run: |
        Start-Sleep -Seconds 21600

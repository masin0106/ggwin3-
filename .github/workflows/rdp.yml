name: Windows-Browser-Final-V3

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download & Install & Force Start
      run: |
        # エージェントをダウンロード
        Invoke-WebRequest https://www.dwservice.net/download/dwagent_x86.exe -OutFile dwagent.exe
        
        # サイレントインストール実行
        ./dwagent.exe -silent key=728-983-580
        
        # 【重要】インストールされたエージェントを強制的に起動
        # 通常、C:\Program Files\DWAgent にインストールされます
        Start-Process "C:\Program Files\DWAgent\dwagent.exe" -ArgumentList "-start"
        
        Write-Host "Wait 30 seconds for agent to link..."
        Start-Sleep -Seconds 30

    - name: Keep Alive
      run: |
        Write-Host "The agent should be online now. Check your DWService dashboard."
        Start-Sleep -Seconds 21600

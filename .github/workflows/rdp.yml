name: Windows-Browser-Ultimate

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Connect DWService Directly
      run: |
        # エージェントをダウンロード
        Invoke-WebRequest https://www.dwservice.net/download/dwagent_x86.exe -OutFile dwagent.exe
        
        # インストールせず、直接「実行モード」で接続
        # -silent の代わりに -run モードを試します
        Start-Process .\dwagent.exe -ArgumentList "-run key=728-983-580"
        
        Write-Host "Connecting to DWService..."
        Start-Sleep -Seconds 30

    - name: Keep Alive
      run: |
        Write-Host "Check your DWService dashboard now!"
        Start-Sleep -Seconds 21600

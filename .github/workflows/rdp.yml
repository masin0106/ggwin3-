name: Windows-RDP-Debug

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Create User & Enable RDP
      run: |
        net user remoteuser P@ssword1234! /add
        net localgroup administrators remoteuser /add
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Start Ngrok & Debug
      run: |
        # 直接実行して、エラーメッセージをログに強制出力させる
        # トークンは secrets.NGROK_AUTH_TOKEN を直接ここに入れます
        .\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        Write-Host "Starting ngrok directly to see errors..."
        # 30秒間だけフォアグラウンドで実行してエラーを吐かせる
        timeout 30 .\ngrok\ngrok.exe tcp --region jp 3389
      continue-on-error: true

    - name: Final Attempt with API
      run: |
        # 再度バックグラウンドで起動を試みる
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp --region jp 3389"
        Start-Sleep -Seconds 20
        $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
        Write-Host "RDP Address: $($response.tunnels[0].public_url)"

name: Windows-Browser-Final-V7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install and Start DWService
      run: |
        # ========== 1. エージェントをダウンロード ==========
        Write-Host ">>> Downloading DWAgent..."
        Invoke-WebRequest -Uri "https://www.dwservice.net/download/dwagent_x86.exe" `
          -OutFile "dwagent.exe" -UseBasicParsing
        Write-Host ">>> Download complete. File size: $((Get-Item dwagent.exe).Length) bytes"

        # ========== 2. サイレントインストール ==========
        Write-Host ">>> Installing DWAgent silently..."
        $proc = Start-Process -FilePath ".\dwagent.exe" `
          -ArgumentList "-silent","key=853-575-307" `
          -Wait -PassThru -NoNewWindow
        Write-Host ">>> Installer exited with code: $($proc.ExitCode)"

        # ========== 3. インストール完了を待機 ==========
        Write-Host ">>> Waiting 30 seconds for service registration..."
        Start-Sleep -Seconds 30

        # ========== 4. サービスを検索・起動 ==========
        Write-Host ">>> Searching for DWAgent service..."
        $svc = Get-Service -ErrorAction SilentlyContinue | Where-Object {
          $_.Name -like "*dwagent*" -or $_.DisplayName -like "*DWAgent*"
        }

        if ($svc) {
          Write-Host ">>> Service found: $($svc.Name) | Status: $($svc.Status)"
          if ($svc.Status -ne 'Running') {
            Write-Host ">>> Starting service..."
            Start-Service -Name $svc.Name -ErrorAction Stop
            Start-Sleep -Seconds 5
          }
          Write-Host ">>> Service is now: $((Get-Service -Name $svc.Name).Status)"
        } else {
          Write-Host ">>> WARNING: DWAgent service not found by name search."
          Write-Host ">>> All services containing 'dw':"
          Get-Service -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "*dw*" } | Format-Table -AutoSize

          # フォールバック: プロセスとして直接実行を試みる
          Write-Host ">>> Attempting to run agent directly..."
          $agentPath = "C:\Program Files\DWAgent\runtime\dwagent.exe"
          $agentPath2 = "C:\Program Files (x86)\DWAgent\runtime\dwagent.exe"

          if (Test-Path $agentPath) {
            Start-Process -FilePath $agentPath -NoNewWindow
            Start-Sleep -Seconds 10
            Write-Host ">>> Agent process started directly."
          } elseif (Test-Path $agentPath2) {
            Start-Process -FilePath $agentPath2 -NoNewWindow
            Start-Sleep -Seconds 10
            Write-Host ">>> Agent process started directly (x86)."
          } else {
            Write-Host ">>> ERROR: Agent executable not found."
            Write-Host ">>> Searching for installed files..."
            Get-ChildItem "C:\Program Files" -Filter "*DW*" -Directory -ErrorAction SilentlyContinue
            Get-ChildItem "C:\Program Files (x86)" -Filter "*DW*" -Directory -ErrorAction SilentlyContinue
          }
        }

    - name: Keep Alive
      run: |
        Write-Host "============================================"
        Write-Host " DWService Agent is running!"
        Write-Host " => https://www.dwservice.net にログインして"
        Write-Host "    ダッシュボードから接続してください"
        Write-Host " => セッションは6時間維持されます"
        Write-Host "============================================"
        Start-Sleep -Seconds 21600

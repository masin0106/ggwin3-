name: Windows-RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Authenticate Ngrok
      run: .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Set Password & Enable RDP
      run: |
        # 接続用のパスワードを設定（好きなものに変えてもOK）
        net user admin 1203
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Create Tunnel
      run: |
        # バックグラウンドで起動し、待機時間を長めに設定
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
        echo "Waiting for ngrok to initialize..."
        Start-Sleep -Seconds 30

    - name: Get RDP Address
      run: |
        $response = curl http://localhost:4040/api/tunnels | ConvertFrom-Json
        $address = $response.tunnels[0].public_url
        Write-Host "------------------------------------------"
        Write-Host "RDP Address: $address"
        Write-Host "User: admin"
        Write-Host "Pass: 1203"
        Write-Host "------------------------------------------"

    - name: Keep Alive
      run: |
        # 6時間維持
        Start-Sleep -Seconds 21600

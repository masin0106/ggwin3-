name: Windows Runner RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Join Tailscale network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-windows-rdp

      - name: Create admin user for RDP
        shell: pwsh
        run: |
          $username = "runneradmin"
          $password = ConvertTo-SecureString "Password123!" -AsPlainText -Force

          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $username -Password $password -FullName "GitHub Actions RDP User" -Description "Temporary admin user for RDP access"
          }

          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue

      - name: Enable RDP and allow through firewall
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Show Tailscale IP
        shell: pwsh
        run: |
          tailscale ip -4
          tailscale status

      - name: Keep runner alive for 6 hours
        shell: pwsh
        run: |
          Start-Sleep -Seconds 21600

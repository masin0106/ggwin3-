name: GitHub Actions Ephemeral yt-dlp Portal

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID from the VPS portal
        required: true
        type: string
      source_url:
        description: Source URL to download
        required: true
        type: string
      request_format:
        description: Requested format preset
        required: true
        type: string
      requested_filename:
        description: Preferred download filename
        required: false
        type: string
      embed_thumbnail:
        description: Embed thumbnail
        required: true
        default: false
        type: boolean
      embed_metadata:
        description: Embed metadata
        required: true
        default: false
        type: boolean
      start_time:
        description: Optional start time
        required: false
        type: string
      end_time:
        description: Optional end time
        required: false
        type: string
      detailed_log:
        description: Send detailed log lines
        required: true
        default: false
        type: boolean
      prefer_modern_codecs:
        description: Prefer AV1 or VP9
        required: true
        default: false
        type: boolean
      callback_base:
        description: VPS callback base URL
        required: true
        type: string
      callback_secret:
        description: VPS callback secret
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg and Python tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip curl
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          chmod +x "$RUNNER_TEMP/cloudflared"
          "$RUNNER_TEMP/cloudflared" --version

      - name: Run ephemeral downloader
        env:
          JOB_ID: ${{ inputs.job_id }}
          SOURCE_URL: ${{ inputs.source_url }}
          REQUEST_FORMAT: ${{ inputs.request_format }}
          REQUESTED_FILENAME: ${{ inputs.requested_filename }}
          EMBED_THUMBNAIL: ${{ inputs.embed_thumbnail }}
          EMBED_METADATA: ${{ inputs.embed_metadata }}
          START_TIME: ${{ inputs.start_time }}
          END_TIME: ${{ inputs.end_time }}
          DETAILED_LOG: ${{ inputs.detailed_log }}
          PREFER_MODERN_CODECS: ${{ inputs.prefer_modern_codecs }}
          CALLBACK_BASE: ${{ inputs.callback_base }}
          CALLBACK_SECRET: ${{ inputs.callback_secret }}
          CLOUDFLARED_BIN: ${{ runner.temp }}/cloudflared
        run: |
          python3 vps-yt-dlp-portal/runner/gha_runner.py
